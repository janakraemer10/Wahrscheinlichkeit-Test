<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:linear-gradient(135deg,#e8eaf6 0%,#f3e5f5 100%);min-height:100vh;color:#333;padding:20px;line-height:1.6}
.nav-top{text-align:right;margin-bottom:10px}
.nav-top a{color:#7c4dff;text-decoration:none;font-size:14px;font-weight:600}
.nav-top a:hover{text-decoration:underline}
.container{max-width:860px;margin:0 auto}
h1{text-align:center;color:#311b92;font-size:28px;margin-bottom:4px}
.subtitle{text-align:center;color:#7c4dff;font-size:16px;margin-bottom:24px;font-weight:500}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.card h2{font-size:20px;color:#311b92;margin-bottom:16px;border-bottom:3px solid #7c4dff;padding-bottom:8px;display:inline-block}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-weight:600;margin-bottom:4px;color:#555;font-size:14px}
.form-group select,.form-group input[type="text"]{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:10px;font-size:16px;transition:border-color .2s}
.form-group select:focus,.form-group input[type="text"]:focus{outline:none;border-color:#7c4dff}
.form-row{display:flex;gap:16px;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:180px}
.question{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #eee}

.q-number{background:#7c4dff;color:#fff;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;margin-top:2px}
.q-text{flex:1;font-size:16px;font-weight:500;padding-top:3px}

.options{margin-top:8px;padding-left:4px}

.order-item:hover{border-color:#b388ff;background:#f3e5f5}
.order-item .order-num{width:26px;height:26px;border-radius:50%;background:#ede7f6;color:#7c4dff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.order-item .order-text{flex:1;font-size:15px}
.order-btns{display:flex;flex-direction:column;gap:4px}
.order-btns button{background:#ede7f6;border:none;border-radius:6px;width:28px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#7c4dff;transition:background .15s}

.katex{font-size:1.05em}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-primary{background:#7c4dff;color:#fff}
.btn-primary:hover{background:#651fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,77,255,.35)}
.btn-secondary{background:#ede7f6;color:#7c4dff}
.btn-secondary:hover{background:#d1c4e9}
.btn-success{background:#2e7d32;color:#fff}

.btn-danger{background:#c62828;color:#fff}
.btn-danger:hover{background:#b71c1c}
.btn-outline{background:transparent;border:2px solid #7c4dff;color:#7c4dff}
.btn-outline:hover{background:#f3e5f5}
.btn-small{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-wrap{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;justify-content:center}
.result-box{text-align:center;padding:24px;border-radius:16px;margin-top:16px}
.result-box.good{background:#e8f5e9;border:2px solid #2e7d32}
.result-box.ok{background:#fff8e1;border:2px solid #f9a825}
.result-box.bad{background:#ffebee;border:2px solid #c62828}
.result-box .score{font-size:48px;font-weight:800;color:#311b92}
.result-box .score-label{font-size:18px;color:#666;margin-top:4px}
.result-box .feedback{font-size:18px;font-weight:600;margin-top:8px}
.msg{display:none;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-weight:500}
.msg.error{display:block;background:#ffebee;color:#c62828;border:1px solid #ef9a9a}

.hidden{display:none}
.attempts-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px}

.attempts-table th{background:#ede7f6;color:#311b92;font-weight:600;font-size:13px}
.attempts-table tr:hover td{background:#f5f5f5}
.solutions-wrap{margin-top:16px;padding:16px;background:#fafafa;border-radius:12px;border:1px solid #eee}
.solution-item{padding:8px 0;border-bottom:1px solid #eee;font-size:14px}
.solution-item:last-child{border-bottom:none}
.solution-item strong{color:#311b92}
@media(max-width:600px){.container{padding:0}.form-row{flex-direction:column}.form-row .form-group{min-width:unset}.btn{padding:10px 20px;font-size:14px;width:100%;justify-content:center}.btn-wrap{flex-direction:column}.result-box .score{font-size:36px}.order-btns button{width:36px;height:32px}}
</style>

<body>
<div class="nav-top"><a href="index.html">&#x2190; Startseite</a></div>
<div class="container">
<h1>&#x1F3B2; Selbsttest Wahrscheinlichkeiten</h1>
<p class="subtitle">Klasse 7 &middot; Br&uuml;che/Dezimalzahlen/Prozent &middot; Laplace &middot; Baumdiagramme &middot; Gewinnwahrscheinlichkeiten</p>

<div id="msgBox" class="msg"></div>

<div id="infoCard" class="card">
  <h2>&#x1F464; Deine Angaben</h2>
  <div class="form-row">
    <div class="form-group">
      <label for="vorname">Vorname</label>
      <input type="text" id="vorname" placeholder="Dein Vorname" autocomplete="given-name">
    </div>
    <div class="form-group">
      <label for="kurs">Kurs</label>
      <select id="kurs"><option value="">Bitte w&auml;hlen</option><option value="7d">7d</option><option value="7f">7f</option></select>
    </div>
  </div>
  <div class="btn-wrap"><button class="btn btn-primary" onclick="startTest()">Test starten</button></div>
</div>

<div id="testCard" class="card hidden">
  <h2>&#x1F4DD; Fragen</h2>
  <div id="questionsContainer"></div>
  <div class="btn-wrap" style="margin-top:20px">
    <button class="btn btn-primary" onclick="evaluateTest()">Auswerten</button>
    <button class="btn btn-outline btn-small" onclick="showAllSolutions()">Richtige Antworten anzeigen</button>
  </div>
</div>

<div id="resultCard" class="card hidden">
  <h2>&#x1F3C6; Ergebnis</h2>
  <div id="resultContent"></div>
  <div class="btn-wrap">
    <button class="btn btn-secondary" onclick="resetTest()">Wiederholen</button>
    <button class="btn btn-outline btn-small" onclick="toggleSolutions()">Richtige Antworten anzeigen</button>
  </div>
  <div id="solutionsArea" class="solutions-wrap hidden"></div>
</div>

<div id="attemptsCard" class="card hidden">
  <h2>&#x1F4CB; Fr&uuml;here Versuche</h2>
  <div style="overflow-x:auto"><table class="attempts-table" id="attemptsTable"><thead><tr><th>#</th><th>Name</th><th>Kurs</th><th>Datum</th><th>Punkte</th><th>Prozent</th></tr></thead><tbody id="attemptsBody"></tbody></table></div>
</div>
</div>

<script>
// ========== KaTeX Hilfsfunktion ==========
function m(latex) {
  try { return katex.renderToString(latex, {throwOnError:false,displayMode:false}); }
  catch(e) { return '<span class="katex-error">'+latex+'</span>'; }
}
function renderMath(text) {
  return text.replace(/m\('([^']*)'\)/g, function(_,z){return m(z);});
}
function stripMath(text) {
  return text.replace(/m\('([^']*)'\)/g, '$1');
}

// ========== Firebase (ERSETZE_MICH) ==========
const firebaseConfig = {
  apiKey: "AIzaSyCk8ibjzzZUH4WT1lS2Osp98_nlUeirKqA",
  authDomain: "wahrscheinlichkeiten-83d54.firebaseapp.com",
  projectId: "wahrscheinlichkeiten-83d54",
  storageBucket: "wahrscheinlichkeiten-83d54.firebasestorage.app",
  messagingSenderId: "576052277361",
  appId: "1:576052277361:web:cb6fc1ee888488a96a2bd0"
};
firebase.initializeApp(firebaseConfig);
const dbFire = firebase.firestore();

// ========== Fragenkatalog ==========
const QUESTIONS = [
  {
    id:1, type:"dropdown", points:1,
    question:"Der Bruch m('\\frac{3}{20}') entspricht ______ %.",
    options:["3","15","20","30"],
    correct:1,
    explanation:"m('\\frac{3}{20} = \\frac{15}{100} = 15\\%')."
  },
  {
    id:2, type:"multiple-choice", points:1,
    question:"40 % als Dezimalzahl geschrieben ist:",
    options:["0,04","0,4","4,0","40,0"],
    correct:1,
    explanation:"40 % = m('\\frac{40}{100}') = 0,4."
  },
  {
    id:3, type:"true-false", points:1,
    question:"Es gilt: m('\\frac{1}{4}') = 0,25 = 25 %.",
    correct:true,
    explanation:"m('\\frac{1}{4} = \\frac{25}{100}') = 0,25 = 25 %."
  },
  {
    id:4, type:"multiple-choice", points:1,
    question:"Ein Laplace-Zufallsger&auml;t liegt vor, wenn&hellip;",
    options:[
      "&hellip;alle Ergebnisse gleich wahrscheinlich sind.",
      "&hellip;die Wahrscheinlichkeiten unterschiedlich sind.",
      "&hellip;das Ger&auml;t nur einmal benutzt wird.",
      "&hellip;es mindestens 6 Ergebnisse gibt."
    ],
    correct:0,
    explanation:"Bei Laplace-Zufallsger&auml;ten haben alle m&ouml;glichen Ergebnisse die gleiche Wahrscheinlichkeit."
  },
  {
    id:5, type:"multi-select", points:1,
    question:"Welche der folgenden sind Laplace-Zufallsger&auml;te? (Mehrere Antworten m&ouml;glich.)",
    options:[
      "Ein fairer sechsseitiger W&uuml;rfel",
      "Eine gezinkte M&uuml;nze (Kopf f&auml;llt h&auml;ufiger)",
      "Ein Gl&uuml;cksrad mit 8 gleich gro&szlig;en Feldern",
      "Das Ziehen einer Kugel aus einer Urne mit 5 gleichen Kugeln"
    ],
    correct:[0,2,3],
    explanation:"Ein fairer W&uuml;rfel, ein Gl&uuml;cksrad mit gleichen Feldern und das Ziehen aus einer Urne mit gleichen Kugeln sind Laplace-Zufallsger&auml;te, da alle Ergebnisse gleich wahrscheinlich sind."
  },
  {
    id:6, type:"true-false", points:1,
    question:"Ein Kreisel hat 8 gleich gro&szlig;e Felder (nummeriert 1 bis 8). Die Wahrscheinlichkeit, eine 3 zu drehen, betr&auml;gt m('\\frac{1}{8}').",
    correct:true,
    explanation:"Da alle 8 Felder gleich gro&szlig; sind, ist jedes Ergebnis gleich wahrscheinlich: P(3) = m('\\frac{1}{8}')."
  },
  {
    id:7, type:"dropdown", points:1,
    question:"Ein Kreisel hat 8 gleich gro&szlig;e Felder (1 bis 8). Die Wahrscheinlichkeit, eine <strong>1 oder eine 5</strong> zu drehen, betr&auml;gt ______ / 8.",
    options:["1","2","3","4"],
    correct:1,
    explanation:"Es gibt zwei g&uuml;nstige Ergebnisse (1 und 5) von 8 m&ouml;glichen: P = m('\\frac{2}{8}')."
  },
  {
    id:8, type:"multiple-choice", points:1,
    question:"Beim Elfmeterschie&szlig;en wurden 8 von 25 Elfmetern verwandelt. Die relative H&auml;ufigkeit in Prozent betr&auml;gt:",
    options:["8 %","25 %","32 %","40 %"],
    correct:2,
    explanation:"m('\\frac{8}{25} = \\frac{32}{100}') = 32 %."
  },
  {
    id:9, type:"ordering", points:1,
    question:"Sortiere die folgenden Darstellungen der gleichen Wahrscheinlichkeit in die Reihenfolge: <strong>Bruch &rarr; Hundertstelbruch &rarr; Dezimalzahl &rarr; Prozentzahl</strong>",
    options:[
      "m('\\frac{3}{4}')",
      "m('\\frac{75}{100}')",
      "0,75",
      "75 %"
    ],
    correctOrder:[0,1,2,3],
    explanation:"m('\\frac{3}{4} = \\frac{75}{100}') = 0,75 = 75 %. Dies ist die typische Umwandlungskette."
  },
  {
    id:10, type:"multiple-choice", points:1,
    question:"In einer Urne sind 3 rote und 2 blaue Kugeln. Es wird zweimal <strong>ohne Zur&uuml;cklegen</strong> gezogen. Wie gro&szlig; ist die Wahrscheinlichkeit, zwei rote Kugeln zu ziehen?",
    options:[
      "m('\\frac{3}{5}')",
      "m('\\frac{6}{25}')",
      "m('\\frac{6}{20}')",
      "m('\\frac{9}{25}')"
    ],
    correct:2,
    explanation:"Nach der Pfadregel: m('\\frac{3}{5} \\times \\frac{2}{4} = \\frac{6}{20}')."
  },
  {
    id:11, type:"true-false", points:1,
    question:"Beim zweistufigen Ziehen <strong>ohne Zur&uuml;cklegen</strong> aus einer Urne &auml;ndern sich die Wahrscheinlichkeiten im zweiten Durchgang.",
    correct:true,
    explanation:"Ohne Zur&uuml;cklegen ver&auml;ndert sich die Zusammensetzung der Urne, daher &auml;ndern sich die Wahrscheinlichkeiten."
  },
  {
    id:12, type:"dropdown", points:1,
    question:"Die ____-Regel besagt: Die Wahrscheinlichkeit eines Ereignisses ist die Summe der Wahrscheinlichkeiten aller Pfade, die zu diesem Ereignis f&uuml;hren.",
    options:["Pfad-","Summen-","Produkt-","Baum-"],
    correct:1,
    explanation:"Die Summenregel (Additionsregel) addiert die Wahrscheinlichkeiten mehrerer Pfade, die zum gleichen Ereignis geh&ouml;ren."
  },
  {
    id:13, type:"multiple-choice", points:1,
    question:"Du w&uuml;rfelst mit einem fairen W&uuml;rfel. Du gewinnst bei einer <strong>1 oder einer 6</strong>. Wie gro&szlig; ist die Gewinnwahrscheinlichkeit?",
    options:[
      "m('\\frac{1}{6}')",
      "m('\\frac{1}{3}')",
      "m('\\frac{1}{2}')",
      "m('\\frac{2}{3}')"
    ],
    correct:1,
    explanation:"P(1 oder 6) = m('\\frac{2}{6} = \\frac{1}{3}')."
  },
  {
    id:14, type:"true-false", points:1,
    question:"Ein W&uuml;rfel, bei dem die 6 durch ein eingebautes Gewicht h&auml;ufiger f&auml;llt als die anderen Zahlen, ist ein Laplace-Zufallsger&auml;t.",
    correct:false,
    explanation:"Die Ergebnisse sind nicht gleich wahrscheinlich, daher ist es kein Laplace-Zufallsger&auml;t."
  },
  {
    id:15, type:"multiple-choice", points:1,
    question:"Du hast zwei W&uuml;rfel: <strong>W&uuml;rfel A</strong> ist ein normaler fairer W&uuml;rfel. Bei <strong>W&uuml;rfel B</strong> kommt die 1 doppelt so h&auml;ufig vor wie jede andere Zahl. Du gewinnst, wenn du eine <strong>1</strong> w&uuml;rfelst. Welche Aussage stimmt?",
    options:[
      "W&uuml;rfel A hat die gr&ouml;&szlig;ere Gewinnwahrscheinlichkeit",
      "W&uuml;rfel B hat die gr&ouml;&szlig;ere Gewinnwahrscheinlichkeit",
      "Beide haben die gleiche Gewinnwahrscheinlichkeit"
    ],
    correct:1,
    explanation:"W&uuml;rfel A: P(1) = m('\\frac{1}{6} \\approx 16,7\\%'). Bei W&uuml;rfel B ist die 1 doppelt so wahrscheinlich (P(1) = m('\\frac{2}{7} \\approx 28,6\\%')). Also ist W&uuml;rfel B besser."
  }
];

// ========== Zustand ==========
let currentAnswers = {};    // { qId: answer }
let evaluated = false;
let showingSolutions = false;
let attempts = JSON.parse(localStorage.getItem('selfTestVersuche') || '[]');

// ========== Test starten ==========
function startTest() {
  const name = document.getElementById('vorname').value.trim();
  const kurs = document.getElementById('kurs').value;
  const msg = document.getElementById('msgBox');
  msg.className = 'msg';
  msg.style.display = 'none';

  if (!name) { showMsg('Bitte gib deinen Vornamen ein.','error'); return; }
  if (!kurs) { showMsg('Bitte w&auml;hle deinen Kurs.','error'); return; }

  document.getElementById('infoCard').classList.add('hidden');
  document.getElementById('testCard').classList.remove('hidden');
  renderQuestions();
}

function showMsg(text,type) {
  const m = document.getElementById('msgBox');
  m.innerHTML = text;
  m.className = 'msg '+type;
  m.style.display = 'block';
}

// ========== Fragen rendern ==========
function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  currentAnswers = {};

  QUESTIONS.forEach((q,i) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qid = q.id;

    const typeLabel = { 'multiple-choice':'Multiple Choice','true-false':'Wahr/Falsch','dropdown':'L&uuml;ckentext','multi-select':'Mehrfachauswahl','ordering':'Reihenfolge' }[q.type] || q.type;

    let html = `<div class="q-header">
      <span class="q-number">${i+1}</span>
      <span class="q-text">${renderMath(q.question)}</span>
      <span class="q-points">${q.points} P.</span>
    </div>
    <span class="q-type-badge">${typeLabel}</span>
    <div class="options" id="opts-${q.id}">`;

    if (q.type === 'multiple-choice') {
      q.options.forEach((opt,oi) => {
        html += `<div class="option"><input type="radio" name="q${q.id}" value="${oi}" id="q${q.id}_${oi}" data-qid="${q.id}"><label for="q${q.id}_${oi}">${renderMath(opt)}</label></div>`;
      });
    } else if (q.type === 'true-false') {
      html += `<div class="option"><input type="radio" name="q${q.id}" value="true" id="q${q.id}_t" data-qid="${q.id}"><label for="q${q.id}_t">Wahr</label></div>`;
      html += `<div class="option"><input type="radio" name="q${q.id}" value="false" id="q${q.id}_f" data-qid="${q.id}"><label for="q${q.id}_f">Falsch</label></div>`;
    } else if (q.type === 'dropdown') {
      html += `<select data-qid="${q.id}" style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:10px;font-size:15px;margin-top:4px">`;
      html += `<option value="">Bitte w&auml;hlen</option>`;
      q.options.forEach((opt,oi) => {
        html += `<option value="${oi}">${renderMath(opt)}</option>`;
      });
      html += `</select>`;
    } else if (q.type === 'multi-select') {
      q.options.forEach((opt,oi) => {
        html += `<div class="option"><input type="checkbox" name="q${q.id}" value="${oi}" id="q${q.id}_${oi}" data-qid="${q.id}"><label for="q${q.id}_${oi}">${renderMath(opt)}</label></div>`;
      });
    } else if (q.type === 'ordering') {
      // Show items in shuffled order for ordering questions
      // We'll store the shuffled indices
      const shuffled = shuffleArray([...Array(q.options.length).keys()]);
      html += `<ul class="order-list" data-qid="${q.id}" id="order-${q.id}">`;
      shuffled.forEach((origIdx,pos) => {
        html += `<li class="order-item" data-orig-idx="${origIdx}" data-pos="${pos}">
          <span class="order-num">${pos+1}</span>
          <span class="order-text">${renderMath(q.options[origIdx])}</span>
          <span class="order-btns">
            <button type="button" onclick="moveOrderItem(${q.id},${pos},-1)" title="nach oben">&uarr;</button>
            <button type="button" onclick="moveOrderItem(${q.id},${pos},1)" title="nach unten">&darr;</button>
          </span>
        </li>`;
      });
      html += `</ul>`;
    }

    html += `</div>`;
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ========== Ordering verschieben ==========
function moveOrderItem(qId, pos, dir) {
  const list = document.getElementById('order-'+qId);
  const items = list.querySelectorAll('.order-item');
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= items.length) return;

  // Swap the items at pos and newPos
  const itemA = items[pos];
  const itemB = items[newPos];
  if (!itemA || !itemB) return;

  // Create document fragment to reorder
  const parent = list;
  if (dir < 0) {
    parent.insertBefore(itemA, itemB);
  } else {
    parent.insertBefore(itemB, itemA);
  }
  // Update numbers
  updateOrderNumbers(qId);
}

function updateOrderNumbers(qId) {
  const list = document.getElementById('order-'+qId);
  const items = list.querySelectorAll('.order-item');
  items.forEach((item, idx) => {
    item.querySelector('.order-num').textContent = idx + 1;
    item.dataset.pos = idx;
  });
}

// ========== Auswerten ==========
function evaluateTest() {
  const name = document.getElementById('vorname').value.trim();
  const kurs = document.getElementById('kurs').value;
  if (!name || !kurs) { showMsg('Bitte gib zuerst deinen Namen und Kurs an.','error'); return; }

  evaluated = true;
  showingSolutions = false;
  collectAnswers();
  let score = 0;
  const maxScore = QUESTIONS.reduce((s,q)=>s+q.points,0);

  // Evaluate each question
  QUESTIONS.forEach(q => {
    const userAns = currentAnswers[q.id];
    const optsDiv = document.getElementById('opts-'+q.id);
    if (!optsDiv) return;

    // Remove existing status classes
    optsDiv.querySelectorAll('.option').forEach(el => {
      el.classList.remove('correct','wrong','missed');
    });

    const isCorrect = checkAnswer(q, userAns);

    if (isCorrect) {
      score += q.points;
    }

    // Mark correct/wrong on options
    markQuestion(q, userAns, optsDiv);
  });

  const percent = Math.round((score / maxScore) * 100);
  const datum = new Date().toLocaleString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

  // Show result
  showResult(score, maxScore, percent, name, kurs, datum);

  // Save to localStorage
  const attempt = { name, kurs, datum, punktzahl:score, prozent:percent, antworten:{...currentAnswers} };
  attempts.push(attempt);
  localStorage.setItem('selfTestVersuche', JSON.stringify(attempts));
  renderAttempts();

  // Send to Firebase
  sendToFirebase(name, kurs, score, percent, datum);

  // Scroll to result
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

function collectAnswers() {
  currentAnswers = {};
  QUESTIONS.forEach(q => {
    if (q.type === 'multiple-choice' || q.type === 'true-false') {
      const sel = document.querySelector(`input[name="q${q.id}"]:checked`);
      if (sel) {
        const val = q.type === 'true-false' ? (sel.value === 'true') : parseInt(sel.value);
        currentAnswers[q.id] = val;
      }
    } else if (q.type === 'dropdown') {
      const sel = document.querySelector(`select[data-qid="${q.id}"]`);
      if (sel && sel.value !== '') {
        currentAnswers[q.id] = parseInt(sel.value);
      }
    } else if (q.type === 'multi-select') {
      const checks = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
      currentAnswers[q.id] = Array.from(checks).map(c => parseInt(c.value));
    } else if (q.type === 'ordering') {
      const items = document.querySelectorAll(`#order-${q.id} .order-item`);
      currentAnswers[q.id] = Array.from(items).map(item => parseInt(item.dataset.origIdx));
    }
  });
}

function checkAnswer(q, userAns) {
  if (userAns === undefined || userAns === null || userAns === '' || (Array.isArray(userAns) && userAns.length === 0)) return false;

  if (q.type === 'multiple-choice' || q.type === 'true-false' || q.type === 'dropdown') {
    return userAns === q.correct;
  } else if (q.type === 'multi-select') {
    if (!Array.isArray(userAns) || !Array.isArray(q.correct)) return false;
    if (userAns.length !== q.correct.length) return false;
    const sorted1 = [...userAns].sort();
    const sorted2 = [...q.correct].sort();
    return sorted1.every((v,i) => v === sorted2[i]);
  } else if (q.type === 'ordering') {
    if (!Array.isArray(userAns) || !Array.isArray(q.correctOrder)) return false;
    return userAns.every((v,i) => v === q.correctOrder[i]);
  }
  return false;
}

function markQuestion(q, userAns, optsDiv) {
  if (q.type === 'multiple-choice') {
    optsDiv.querySelectorAll('.option').forEach((opt,oi) => {
      const radio = opt.querySelector('input');
      if (oi === q.correct) opt.classList.add('correct');
      if (radio && radio.checked && oi !== q.correct) opt.classList.add('wrong');
    });
  } else if (q.type === 'true-false') {
    optsDiv.querySelectorAll('.option').forEach((opt,oi) => {
      const radio = opt.querySelector('input');
      const val = radio.value === 'true';
      if (val === q.correct && !radio.checked) opt.classList.add('missed');
      if (radio && radio.checked && val !== q.correct) opt.classList.add('wrong');
      if (val === q.correct && radio.checked) opt.classList.add('correct');
    });
  } else if (q.type === 'dropdown') {
    const sel = optsDiv.querySelector('select');
    const correctVal = q.correct;
    if (sel) {
      if (parseInt(sel.value) === correctVal) {
        sel.style.borderColor = '#2e7d32';
        sel.style.background = '#e8f5e9';
      } else {
        sel.style.borderColor = '#c62828';
        sel.style.background = '#ffebee';
      }
    }
  } else if (q.type === 'multi-select') {
    optsDiv.querySelectorAll('.option').forEach((opt,oi) => {
      const cb = opt.querySelector('input');
      const isCorrect = q.correct.includes(oi);
      if (cb && cb.checked && !isCorrect) opt.classList.add('wrong');
      if (isCorrect && cb && cb.checked) opt.classList.add('correct');
      if (isCorrect && cb && !cb.checked) opt.classList.add('missed');
    });
  } else if (q.type === 'ordering') {
    // For ordering, we mark individual items. We'll add a visual indicator at the top.
    const isCorrect = checkAnswer(q, userAns);
    const list = optsDiv.querySelector('.order-list');
    if (list) {
      if (isCorrect) {
        list.style.border = '2px solid #2e7d32';
        list.style.borderRadius = '10px';
        list.style.padding = '4px';
      } else {
        list.style.border = '2px solid #c62828';
        list.style.borderRadius = '10px';
        list.style.padding = '4px';
        // Show correct order
        let hint = '<div style="font-size:13px;color:#2e7d32;margin-top:8px;padding:8px;background:#e8f5e9;border-radius:8px"><strong>Richtige Reihenfolge:</strong> ';
        const correctItems = q.correctOrder.map(idx => stripMath(q.options[idx]));
        hint += correctItems.map((t,ix) => (ix+1)+'. '+t).join(' &rarr; ');
        hint += '</div>';
        list.insertAdjacentHTML('afterend', hint);
      }
    }
  }
}

// ========== Ergebnisse anzeigen ==========
function showResult(score, maxScore, percent, name, kurs, datum) {
  document.getElementById('testCard').classList.add('hidden');
  const rc = document.getElementById('resultCard');
  rc.classList.remove('hidden');
  document.getElementById('attemptsCard').classList.remove('hidden');

  let feedback, cls;
  if (percent >= 80) { feedback = '&#x1F389; Super gemacht! Du hast die Themen gut verstanden.'; cls = 'good'; }
  else if (percent >= 60) { feedback = '&#x1F44D; Nicht schlecht! &Uuml;be noch ein wenig.'; cls = 'ok'; }
  else { feedback = '&#x1F4AA; &Uuml;be weiter! Schau dir die richtigen Antworten an.'; cls = 'bad'; }

  document.getElementById('resultContent').innerHTML = `
    <div class="result-box ${cls}">
      <div class="score">${score} / ${maxScore}</div>
      <div class="score-label">${percent}% der Punkte erreicht</div>
      <div class="feedback">${feedback}</div>
      <div style="margin-top:8px;font-size:14px;color:#666">${name} &middot; Kurs ${kurs} &middot; ${datum}</div>
    </div>`;
}

function toggleSolutions() {
  showingSolutions = !showingSolutions;
  document.getElementById('solutionsArea').classList.toggle('hidden', !showingSolutions);
  if (showingSolutions) renderSolutions();
}

function showAllSolutions() {
  showingSolutions = true;
  document.getElementById('solutionsArea').classList.remove('hidden');
  renderSolutions();
}

function renderSolutions() {
  const area = document.getElementById('solutionsArea');
  let html = '<h3 style="margin-bottom:10px;color:#311b92">&#x1F4A1; Richtige Antworten</h3>';
  QUESTIONS.forEach((q,i) => {
    const userAns = currentAnswers[q.id];
    const isCorrect = userAns !== undefined ? checkAnswer(q, userAns) : false;
    const icon = isCorrect ? '&#x2705;' : '&#x274C;';
    let correctStr = '';
    if (q.type === 'multiple-choice') {
      correctStr = renderMath(q.options[q.correct]);
    } else if (q.type === 'true-false') {
      correctStr = q.correct ? 'Wahr' : 'Falsch';
    } else if (q.type === 'dropdown') {
      correctStr = renderMath(q.options[q.correct]);
    } else if (q.type === 'multi-select') {
      correctStr = q.correct.map(idx => renderMath(q.options[idx])).join(', ');
    } else if (q.type === 'ordering') {
      correctStr = q.correctOrder.map(idx => renderMath(q.options[idx])).join(' &rarr; ');
    }
    html += `<div class="solution-item">${icon} <strong>${i+1}.</strong> ${renderMath(q.question)}<br><span style="margin-left:24px;color:#2e7d32">${correctStr}</span>`;
    if (q.explanation && !isCorrect) {
      html += `<br><span style="margin-left:24px;font-size:13px;color:#666">${q.explanation}</span>`;
    }
    html += `</div>`;
  });
  area.innerHTML = html;
}

// ========== Firebase senden ==========
function sendToFirebase(name, kurs, punktzahl, prozent, datum) {
  const expireAt = new Date();
  expireAt.setFullYear(expireAt.getFullYear() + 1);
  dbFire.collection("ergebnisse").add({
    name,
    kurs,
    punktzahl,
    prozent,
    datum,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
    expireAt
  }).catch(err => console.warn('Firebase-Fehler:', err));
}

// ========== Versuche-Tabelle ==========
function renderAttempts() {
  const tbody = document.getElementById('attemptsBody');
  if (attempts.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:20px">Noch keine Versuche.</td></tr>'; return; }
  tbody.innerHTML = attempts.map((a,i) => `<tr><td>${i+1}</td><td>${a.name}</td><td>${a.kurs}</td><td>${a.datum}</td><td>${a.punktzahl}</td><td>${a.prozent}%</td></tr>`).join('');
}

// ========== Reset ==========
function resetTest() {
  evaluated = false;
  showingSolutions = false;
  currentAnswers = {};
  document.getElementById('testCard').classList.add('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('solutionsArea').classList.add('hidden');
  document.getElementById('attemptsCard').classList.add('hidden');
  document.getElementById('infoCard').classList.remove('hidden');
  document.getElementById('questionsContainer').innerHTML = '';
  document.getElementById('vorname').value = '';
  document.getElementById('kurs').value = '';
}

// ========== Initialisierung ==========
renderAttempts();

// Allow Enter to start test
document.getElementById('vorname').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startTest();
});
</script>
